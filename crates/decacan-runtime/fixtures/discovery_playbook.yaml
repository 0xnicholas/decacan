metadata:
  title: "主题发现"
  description: "扫描 markdown 文件并发现关键主题"
  mode: discovery
  version: "1.0.0"
  tags: ["文档处理", "主题发现", "分析"]

input_schema:
  - name: source_directory
    type: path
    required: true
    description: "包含 markdown 文件的目录"
  - name: min_topic_length
    type: integer
    required: false
    default: 3
    description: "最小主题长度"

workflow:
  steps:
    - id: scan
      name: 扫描文件
      description: "扫描工作区中的 markdown 文件"
      routine:
        class: builtin
        name: scan_markdown_files
        version: "1.0.0"
      input_mapping:
        directory: "{{ input.source_directory }}"
      transition:
        type: next
        step_id: read
      error_handling:
        on_error: skip
    
    - id: read
      name: 读取内容
      routine:
        class: builtin
        name: read_file_content
      transition:
        type: next
        step_id: discover
      fallback:
        action: use_default
        default_value: {"content": "", "skipped": true}
    
    - id: discover
      name: 发现主题
      description: "从文档中发现关键主题"
      routine:
        class: builtin
        name: discover_themes
      transition:
        type: conditional
        branches:
          - condition: "output.themes.length > 0"
            step_id: analyze
          - condition: "output.themes.length == 0"
            step_id: report_empty
    
    - id: report_empty
      name: 报告空结果
      description: "没有找到主题时的报告"
      routine:
        class: builtin
        name: generate_empty_report
      transition:
        type: next
        step_id: write
    
    - id: analyze
      name: 分析主题
      description: "深入分析发现的主题"
      routine:
        class: builtin
        name: analyze_themes
      transition:
        type: next
        step_id: draft
    
    - id: draft
      name: 起草发现报告
      routine:
        class: builtin
        name: draft_discovery
      transition:
        type: next
        step_id: write
    
    - id: write
      name: 写入输出
      routine:
        class: builtin
        name: write_output
      transition:
        type: next
        step_id: register
    
    - id: register
      name: 注册产物
      routine:
        class: builtin
        name: register_artifact
      transition:
        type: end

capability_refs:
  routines:
    - builtin.scan_markdown_files
    - builtin.read_file_content
    - builtin.discover_themes
    - builtin.analyze_themes
    - builtin.generate_empty_report
    - builtin.draft_discovery
    - builtin.write_output
    - builtin.register_artifact
  tools:
    - builtin.workspace.read
    - builtin.workspace.write

output_contract:
  primary_artifact:
    type: markdown_document
    path: "output/discovery.md"
    schema: discovery_schema_v1
  backup_policy: single
